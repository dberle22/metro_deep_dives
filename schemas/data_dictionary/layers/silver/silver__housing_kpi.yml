kpi_definitions:
  - kpi_name: hu_total
    business_definition: Total.
    source: ACS Housing (B2500x)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: occ_total
    business_definition: Total:.
    source: ACS Housing (B2500x)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: occ_occupied
    business_definition: Total:, Occupied.
    source: ACS Housing (B2500x)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: occ_vacant
    business_definition: Total:, Vacant.
    source: ACS Housing (B2500x)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: vacancy_rate
    business_definition: Rate derived from ACS counts. (from silver.kpi_dictionary).
    source: ACS Housing (B2500x)
    denominator_hint: hu_total
    data_type: DOUBLE
