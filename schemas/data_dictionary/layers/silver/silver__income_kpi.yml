kpi_definitions:
  - kpi_name: median_hh_income
    business_definition: Median household income in the past 12 months (in 2024 inflation-adjusted
      dollars).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: per_capita_income
    business_definition: Per capita income in the past 12 months (in 2024 inflation-adjusted
      dollars).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: pov_universe
    business_definition: Total:.
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: pov_below
    business_definition: Total:, Income in the past 12 months below poverty level:.
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: pov_rate
    business_definition: Rate derived from ACS counts. (from silver.kpi_dictionary).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: gini_index
    business_definition: Ratio of gini indexE + mutate + pct hh lt25k + hh inc lt10kE
      + hh inc 10k 15kE + hh inc 15k 20kE + hh inc 20k 25kE to hh inc totalE.
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: ~
    data_type: DOUBLE
  - kpi_name: pct_hh_lt25k
    business_definition: Share / percentage; denominator defined in KPI logic. (from
      silver.kpi_dictionary).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: households (topic-specific)
    data_type: DOUBLE
  - kpi_name: pct_hh_25k_50k
    business_definition: Share / percentage; denominator defined in KPI logic. (from
      silver.kpi_dictionary).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: households (topic-specific)
    data_type: DOUBLE
  - kpi_name: pct_hh_50k_100k
    business_definition: Share / percentage; denominator defined in KPI logic. (from
      silver.kpi_dictionary).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: households (topic-specific)
    data_type: DOUBLE
  - kpi_name: pct_hh_100k_plus
    business_definition: Share / percentage; denominator defined in KPI logic. (from
      silver.kpi_dictionary).
    source: ACS Income/Poverty (B19xxx/B17xxx)
    denominator_hint: households (topic-specific)
    data_type: DOUBLE
