table_name: xwalk_cbsa_county
schema: silver
grain: "One row per CBSA-county relationship for a given vintage (observed vintage: 2023)."
primary_key:
  - cbsa_code
  - county_geoid
foreign_keys:
  - column: county_geoid
    references: silver.xwalk_county_state.county_geoid
    status: inferred
  - column: cbsa_code
    references: geo.cbsas.cbsa_code
    status: inferred
time_coverage:
  type: snapshot
  vintage_column: vintage
  min: 2023
  max: 2023
geo_coverage:
  geo_unit: county within CBSA
  distinct_cbsa: 935
  distinct_counties: 1915
  distinct_state_fips: 52
  notes:
    - "Table includes counties assigned to CBSAs/micropolitan areas only (not all US counties)."
columns:
