lineage:
  - step: read_source
    script: scripts/etl/silver/geo_crosswalks_silver.R:25
    details: "Reads OMB CBSA-county workbook: data/demographics/raw/crosswalks/cbsa_county_xwalk_census.xlsx (skip=2)."
  - step: transform_columns
    script: scripts/etl/silver/geo_crosswalks_silver.R:28
    details: "Selects/renames CBSA, CSA, county, and state fields; filters rows with non-null cbsa_name."
  - step: derive_keys
    script: scripts/etl/silver/geo_crosswalks_silver.R:45
    details: "Derives county_geoid from state_fips + county_fips; adds vintage=2023 and source='OMB_2023'."
  - step: write_target
    script: scripts/etl/silver/geo_crosswalks_silver.R:50
    details: "Writes to silver.xwalk_cbsa_county with overwrite=TRUE."
  - step: documented_contract
    script: documents/database_design/XWALK_README.md:66
    details: "Design doc mirrors source and transform intent for CBSA-county crosswalk."
kpi_definitions: []
notes:
  - "silver metadata seed tables exist but currently have no xwalk_cbsa_county rows."
  - "County_geoid is unique in current snapshot; treat as observed property, not guaranteed across future vintages."
