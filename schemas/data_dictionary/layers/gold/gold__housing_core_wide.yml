  - name: pct_struct_sf_det
    type: DOUBLE
    definition: Share of structures that are single-family detached.
  - name: pct_struct_small_mf
    type: DOUBLE
    definition: Share of structures that are small multifamily.
  - name: pct_struct_mid_mf
    type: DOUBLE
    definition: Share of structures that are mid-size multifamily.
  - name: pct_struct_large_mf
    type: DOUBLE
    definition: Share of structures that are large multifamily.
  - name: pct_struct_mobile
