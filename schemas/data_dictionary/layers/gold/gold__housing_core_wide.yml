  - name: permits_share_units_5_plus
    type: DOUBLE
    definition: Share of permitted units in 5-plus-unit structures.
  - name: permits_share_units_1_unit
    type: DOUBLE
    definition: Share of permitted units in 1-unit structures.
  - name: permits_structure_mix
    type: VARCHAR
    definition: Categorical structure mix label from BPS.
  - name: permits_per_1000_housing_units
    type: DOUBLE
